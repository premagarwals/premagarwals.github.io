    <body>
        <section class="top"> 
         <div data-aos="fade-right" class="top1">  
             <h1> Prem A<span class="flick">g</span>arwal's </h1>
             <p> <span> “ </span>Hey! I'm Prem. Welcome to this dreamy world! <span> " </span></p>
         </div>
     </section>
     <div class="comment cont">  
           <form class="contact" method="post" onsubmit="send()">
            <h4 data-aos="zoom-in-down">What's making you <span class="flick">curious</span>?</h4>
            <fieldset>
              <input id="name" placeholder="Your name" type="text" tabindex="1" required>
            </fieldset>
            <fieldset>
              <input id="email" placeholder="Your Email Address" type="email" tabindex="2" required>
            </fieldset>
            <fieldset>
              <input id="phone" placeholder="Your Phone Number" type="tel" tabindex="3" pattern="[0-9]{10}" required>
            </fieldset>
            <fieldset>
              <textarea id="say" placeholder="Type your Message Here...." tabindex="5" required></textarea>
            </fieldset>
            <fieldset>
              <button name="submit" type="submit" id="contact-submit" data-submit="...Sending">Submit</button>
            </fieldset>
           </form>
     </div>
    </body>
